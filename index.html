<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <title>o mais brabo da familia</title>

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/188/188987.png">

  <style>

    body{
      margin:0;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;

      text-align:center;
      color:white;
      font-family:Arial;

      background-image:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
        url("https://images.unsplash.com/photo-1496307653780-42ee777d4833");

      background-size:cover;
      background-position:center;
      overflow:hidden;
    }

    h1{
      font-size:65px;
      text-shadow:0 0 15px #00f2ff;
    }

    .mensagem{
      width:700px;
      font-size:28px;
      background:rgba(0,0,0,0.6);
      padding:20px;
      border-radius:20px;
    }

    /* 🔘 botão só decorativo */
    button{
      margin-top:20px;
      padding:15px 30px;
      font-size:18px;

      border:none;
      border-radius:12px;

      background:#111;
      color:white;

      box-shadow:0 0 15px #00f2ff;
      cursor:default;
    }

    /* 🌧️ CHUVA */
    .rain {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      overflow:hidden;
    }

    .drop {
      position:absolute;
      width:2px;
      height:80px;
      background:linear-gradient(transparent, #00f2ff);
      animation: fall linear infinite;
      opacity:0.5;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }

  </style>

</head>

<body>

  <h1>Meu primeiro site 😎</h1>

  <p class="mensagem">
    salve pepaaaaaa piiiiiggg 🐷
    <br><br>
    o mais brabo dos brabos da familia
  </p>

  <!-- 🎵 YOUTUBE (COM ANÚNCIO MESMO) -->
  <iframe
    width="0"
    height="0"
    src="https://www.youtube.com/embed/IfVqba_ey54?autoplay=1&loop=1&playlist=IfVqba_ey54"
    allow="autoplay"
    frameborder="0">
  </iframe>

  <!-- 🔘 BOTÃO DECORATIVO -->
  <button>🎵 música tocando...</button>

  <!-- 🌧️ CHUVA -->
  <div class="rain" id="rain"></div>

  <script>
    // 🌧️ criar chuva
    const rain = document.getElementById("rain");

    for(let i = 0; i < 80; i++){
      let drop = document.createElement("div");
      drop.classList.add("drop");

      drop.style.left = Math.random() * 100 + "vw";
      drop.style.animationDuration = (Math.random() * 1 + 0.5) + "s";
      drop.style.opacity = Math.random();

      rain.appendChild(drop);
    }
  </script>

</body>

</html>
