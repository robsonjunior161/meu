<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <title>o mais brabo da familia</title>

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/188/188987.png">

  <style>

    /* 🌌 FUNDO NEON ANIMADO */
    body{
      margin:0;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;

      text-align:center;
      color:white;
      font-family:Arial;

      background: linear-gradient(-45deg,
        #0f0c29,
        #302b63,
        #24243e,
        #00f2ff,
        #ff00ff
      );

      background-size: 400% 400%;
      animation: fundoNeon 10s ease infinite;
    }

    @keyframes fundoNeon {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }

    /* ✨ TÍTULO NEON */
    h1{
      font-size:70px;
      text-shadow:
        0 0 10px #00f2ff,
        0 0 20px #ff00ff,
        0 0 40px #00f2ff;
    }

    /* 📦 CAIXA DE TEXTO */
    .mensagem{
      width:700px;
      font-size:32px;
      line-height:1.5;
      background:rgba(0,0,0,0.6);
      padding:20px;
      border-radius:20px;
      box-shadow: 0 0 20px #00f2ff;
    }

    /* 🔘 BOTÃO NEON ANIMADO */
    button{
      margin-top:20px;
      padding:15px 30px;
      font-size:18px;

      border:none;
      border-radius:12px;
      cursor:pointer;

      color:white;
      background:#111;

      box-shadow:
        0 0 10px #00f2ff,
        0 0 20px #ff00ff;

      transition:0.3s;
    }

    button:hover{
      transform:scale(1.1);
      box-shadow:
        0 0 20px #00f2ff,
        0 0 40px #ff00ff,
        0 0 60px #00f2ff;
    }

  </style>

</head>

<body>

  <h1>Meu primeiro site 😎</h1>

  <p class="mensagem">
    eu criei esse site 10:28 da manhã adriana,
    salve pepaaaaaa piiiiiggg 🐷
    <br><br>
    o mais brabo dos brabos da familia,
    vai tomando filhão 😎
  </p>

  <!-- 🎵 MÚSICA -->
  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <button onclick="tocarMusica()">Tocar música 🎵</button>

  <script>
    function tocarMusica(){
      const audio = document.getElementById("musica");
      audio.volume = 0.2;
      audio.play();
    }
  </script>

</body>

</html>
