<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <title>o mais brabo da familia</title>

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/188/188987.png">

  <style>

    body{
      margin:0;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;

      text-align:center;

      color:white;
      font-family:Arial;

      background-image:url('https://images.unsplash.com/photo-1519608487953-e999c86e7455');

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    h1{
      font-size:70px;
      text-shadow:0 0 15px black;
    }

    .mensagem{
      width:700px;
      font-size:32px;
      line-height:1.5;
      background:rgba(0,0,0,0.5);
      padding:20px;
      border-radius:20px;
      text-shadow:0 0 10px black;
    }

    button{
      margin-top:20px;
      padding:10px 20px;
      font-size:18px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

  </style>

</head>

<body>

  <h1>Meu primeiro site 😎</h1>

  <p class="mensagem">
    eu criei esse site 10:28 da manhã adriana,
    salve pepaaaaaa piiiiiggg 🐷
    <br><br>
    o mais brabo dos brabos da familia,
    vai tomando filhão 😎
  </p>

  <!-- 🎵 ÁUDIO (SEM ANÚNCIO, COM VOLUME CONTROLADO) -->
  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <!-- 🔘 BOTÃO PRA INICIAR -->
  <button onclick="tocarMusica()">Tocar música 🎵</button>

  <script>
    function tocarMusica(){
      let audio = document.getElementById("musica");
      audio.volume = 0.5; // 🔊 50%
      audio.play();
    }
  </script>

</body>

</html>
