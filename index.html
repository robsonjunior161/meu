<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <title>o mais brabo da familia</title>

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/188/188987.png">

  <style>

    body{
      margin:0;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;

      text-align:center;
      color:white;
      font-family:Arial;

      overflow:hidden;

      /* 🌆 fundo cyberpunk */
      background-image:
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.85)),
        url("https://images.unsplash.com/photo-1496307653780-42ee777d4833");

      background-size:cover;
      background-position:center;
    }

    h1{
      font-size:65px;
      text-shadow:
        0 0 10px #00f2ff,
        0 0 20px #ff00ff;
    }

    .mensagem{
      width:700px;
      font-size:28px;
      line-height:1.5;
      background:rgba(0,0,0,0.6);
      padding:20px;
      border-radius:20px;
      box-shadow:0 0 20px #00f2ff;
    }

    button{
      margin-top:20px;
      padding:15px 30px;
      font-size:18px;

      border:none;
      border-radius:12px;

      background:#111;
      color:white;

      cursor:pointer;

      box-shadow:
        0 0 10px #00f2ff,
        0 0 20px #ff00ff;

      transition:0.3s;
    }

    button:hover{
      transform:scale(1.1);
      box-shadow:
        0 0 20px #00f2ff,
        0 0 40px #ff00ff;
    }

    /* 🌧️ chuva */
    .rain {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .drop {
      position:absolute;
      width:2px;
      height:80px;
      background:linear-gradient(transparent, #00f2ff);
      animation: fall linear infinite;
      opacity:0.6;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
      }
    }

  </style>

</head>

<body>

  <h1>Meu primeiro site 😎</h1>

  <p class="mensagem">
    eu criei esse site 10:28 da manhã adriana,
    salve pepaaaaaa piiiiiggg 🐷
    <br><br>
    o mais brabo dos brabos da familia
  </p>

  <!-- 🎵 ÁUDIO LOCAL -->
  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <button onclick="tocarMusica()">Tocar música 🎵</button>

  <!-- 🌧️ chuva -->
  <div class="rain" id="rain"></div>

  <script>

    // 🌧️ criar chuva
    const rain = document.getElementById("rain");

    for(let i = 0; i < 80; i++){
      let drop = document.createElement("div");
      drop.classList.add("drop");

      drop.style.left = Math.random() * 100 + "vw";
      drop.style.animationDuration = (Math.random() * 1 + 0.5) + "s";
      drop.style.opacity = Math.random();

      rain.appendChild(drop);
    }

    // 🎵 música
    const audio = document.getElementById("musica");
    audio.volume = 0.2;

    function tocarMusica(){
      audio.play().catch(() => {});
    }

    // 🔥 tenta manter tocando se pausar
    setInterval(() => {
      if (audio.paused) {
        audio.play().catch(() => {});
      }
    }, 3000);

  </script>

</body>

</html>
